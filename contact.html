<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Café Associatif - Contact</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <h1>Café Associatif</h1>
        <nav>
            <a href="index.html">Accueil</a>
            <a href="menu.html">Menu</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>
    <main>
        <h2>Nous contacter</h2>
        <div class="contact-container">
            <div class="contact-form">
                <h3>Envoyez-nous un message</h3>
                <form action="#" method="post">
                    <div class="form-group">
                        <label>Nom :</label><input type="text" required>
                    </div>
                    <div class="form-group">
                        <label>Email :</label><input type="email" required>
                    </div>
                    <div class="form-group">
                        <label>Message :</label><textarea rows="4" required></textarea>
                    </div>
                    <button type="submit" class="btn-submit">Envoyer</button>
                </form>
            </div>
        </div>
    </main>
    <footer>
        <p>&copy; 2025 Café Associatif - Ouvert du mardi au dimanche</p>
    </footer>
</body>
</html>
